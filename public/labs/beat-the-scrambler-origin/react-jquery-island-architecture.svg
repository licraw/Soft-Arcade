<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">React and jQuery island architecture for Beat the Scrambler</title>
  <desc id="desc">React owns the page shell and static game scaffold, jQuery owns the puzzle runtime and DOM animation, and shared platform modules provide leaderboards, arcade names, and analytics.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a4f" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1b2335" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="640" fill="#f8fafc" />
  <rect x="70" y="60" width="1060" height="520" rx="22" fill="#ffffff" stroke="#d8dee9" stroke-width="3" />
  <text x="100" y="112" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2937">Beat the Scrambler runtime boundary</text>
  <text x="100" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#607087">React provides the shell. jQuery owns the moving puzzle. Platform services stay outside the game runtime.</text>

  <g filter="url(#shadow)">
    <rect x="105" y="210" width="275" height="250" rx="14" fill="#eef6ff" stroke="#8bb8e8" stroke-width="3" />
    <text x="135" y="260" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#183b66">React shell</text>
    <text x="135" y="304" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2f4f73">Routing and layout</text>
    <text x="135" y="338" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2f4f73">HUD containers</text>
    <text x="135" y="372" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2f4f73">Menus and modals</text>
    <text x="135" y="406" font-family="Inter, Arial, sans-serif" font-size="18" fill="#2f4f73">Mount and cleanup</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="462" y="190" width="305" height="290" rx="14" fill="#fff5e8" stroke="#e0a35e" stroke-width="3" />
    <text x="492" y="242" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#6b3d0f">jQuery runtime</text>
    <text x="492" y="286" font-family="Inter, Arial, sans-serif" font-size="18" fill="#78562d">Board state</text>
    <text x="492" y="320" font-family="Inter, Arial, sans-serif" font-size="18" fill="#78562d">Tile movement</text>
    <text x="492" y="354" font-family="Inter, Arial, sans-serif" font-size="18" fill="#78562d">DOM animation</text>
    <text x="492" y="388" font-family="Inter, Arial, sans-serif" font-size="18" fill="#78562d">Keyboard and touch input</text>
    <text x="492" y="422" font-family="Inter, Arial, sans-serif" font-size="18" fill="#78562d">Namespaced event handlers</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="848" y="210" width="245" height="250" rx="14" fill="#eefbf2" stroke="#7ebf93" stroke-width="3" />
    <text x="878" y="260" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#1f5c35">Platform layer</text>
    <text x="878" y="304" font-family="Inter, Arial, sans-serif" font-size="18" fill="#356846">Arcade names</text>
    <text x="878" y="338" font-family="Inter, Arial, sans-serif" font-size="18" fill="#356846">Leaderboards</text>
    <text x="878" y="372" font-family="Inter, Arial, sans-serif" font-size="18" fill="#356846">PostHog events</text>
    <text x="878" y="406" font-family="Inter, Arial, sans-serif" font-size="18" fill="#356846">Shared UI patterns</text>
  </g>

  <line x1="385" y1="335" x2="455" y2="335" stroke="#2f3a4f" stroke-width="4" marker-end="url(#arrow)" />
  <text x="392" y="313" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#2f3a4f">mounts</text>

  <line x1="770" y1="335" x2="840" y2="335" stroke="#2f3a4f" stroke-width="4" marker-end="url(#arrow)" />
  <text x="774" y="313" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#2f3a4f">calls</text>

  <path d="M 625 486 C 625 548, 215 548, 215 466" fill="none" stroke="#2f3a4f" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)" />
  <text x="330" y="535" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#2f3a4f">cleanup callback returns to React</text>
</svg>
